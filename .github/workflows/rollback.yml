name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image tag to deploy (e.g. v2.3.0)"
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify Image Exists
        run: |
          docker manifest inspect kamit6337/pulse-stack:${{ github.event.inputs.version }}

      - name: Pull Selected Version
        run: |
          docker pull kamit6337/pulse-stack:${{ github.event.inputs.version }}

      - name: Tag as Latest
        run: |
          docker tag \
            kamit6337/pulse-stack:${{ github.event.inputs.version }} \
            kamit6337/pulse-stack:latest

      - name: Push Latest
        run: |
          docker push kamit6337/pulse-stack:latest

      - name: Summary
        run: |
          echo "Rolled back latest to ${{ github.event.inputs.version }}"
